name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3, or major|minor|patch)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag, push the version bump, and publish the release
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # prompts.generated.ts is committed; regenerate and fail if it drifted from the .md sources.
      - run: npm run gen:prompts
      - run: git diff --exit-code src/agents/prompts.generated.ts

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --coverage
      - run: npm run build

      # Bump package.json, commit, and create the vX.Y.Z tag (only after all checks pass).
      - name: Bump version and tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          new="$(npm version "${{ inputs.version }}" -m "release: v%s")"
          echo "tag=$new" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
