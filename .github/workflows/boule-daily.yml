# Dogfooding: Boule grooms its own backlog and posts a daily status Discussion.
# Repo/org secrets (named BOULE_* because Actions forbids the reserved `GITHUB_` prefix):
#   CLAUDE_CODE_OAUTH_TOKEN    — Claude Code token from `claude setup-token` (Pro/Max subscription;
#                                swap for ANTHROPIC_API_KEY to meter via an API key)
#   BOULE_APP_ID               — GitHub App id
#   BOULE_APP_INSTALLATION_ID  — its installation id on this org/repo
#   BOULE_APP_PRIVATE_KEY      — the app private key (base64-encoded PEM recommended)
# Simpler alternative to the App trio: one BOULE_GITHUB_TOKEN (fine-grained PAT) mapped to env
# GITHUB_TOKEN. The built-in GITHUB_TOKEN can't write org Projects v2 or Discussions.
name: Boule Daily

on:
  schedule:
    - cron: "0 13 * * 1-5" # 13:00 UTC, weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only; write nothing"
        type: boolean
        default: false

concurrency:
  group: boule-daily
  cancel-in-progress: false

jobs:
  groom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Triage the backlog
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BOULE_APP_ID: ${{ secrets.BOULE_APP_ID }}
          BOULE_APP_INSTALLATION_ID: ${{ secrets.BOULE_APP_INSTALLATION_ID }}
          BOULE_APP_PRIVATE_KEY: ${{ secrets.BOULE_APP_PRIVATE_KEY }}
          BOULE_REPO: ${{ github.repository }}
        run: node dist/bin.js triage ${{ inputs.dry_run && '--dry-run' || '' }} --budget 3

      - name: Post daily status
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BOULE_APP_ID: ${{ secrets.BOULE_APP_ID }}
          BOULE_APP_INSTALLATION_ID: ${{ secrets.BOULE_APP_INSTALLATION_ID }}
          BOULE_APP_PRIVATE_KEY: ${{ secrets.BOULE_APP_PRIVATE_KEY }}
          BOULE_REPO: ${{ github.repository }}
        run: node dist/bin.js daily ${{ inputs.dry_run && '--dry-run' || '' }} --budget 2
